name: Frontend — Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Pull, Build & Deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "${{ secrets.VPS_PORT }}" || { echo "Missing secret: VPS_PORT"; exit 1; }
          test -n "${{ secrets.VPS_USER }}" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "${{ secrets.VPS_SSH_KEY }}" || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }
          test -n "${{ secrets.VPS_DEPLOY_PATH }}" || { echo "Missing secret: VPS_DEPLOY_PATH"; exit 1; }
      - name: Pull, build, and deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git checkout main
            git reset --hard HEAD
            git pull origin main
            bash deploy.sh
